<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CarDex</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#111;
    color:white;
}
header{
    background:#d50000;
    padding:20px;
    text-align:center;
    font-size:32px;
    font-weight:bold;
}
.search{
    text-align:center;
    margin:30px;
}
input{
    width:80%;
    max-width:500px;
    padding:12px;
    border-radius:30px;
    border:none;
    font-size:18px;
}
h2{
    text-align:center;
}
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:15px;
    padding:20px;
}
.card{
    background:#222;
    border-radius:12px;
    padding:20px;
    text-align:center;
    font-size:20px;
    cursor:pointer;
    transition:.3s;
}
.card:hover{
    background:#d50000;
}
</style>

</head>

<body>

<header>🚗 CarDex</header>

<div class="search">
<input type="text" placeholder="ابحث عن سيارة...">
</div>

<h2>اختر الشركة</h2>

<div class="grid">
<div class="card">Mercedes-Benz</div>
<div class="card">Audi</div>
<div class="card">BMW</div>
<div class="card">Toyota</div>
<div class="card">Honda</div>
<div class="card">Hyundai</div>
<div class="card">Kia</div>
<div class="card">Porsche</div>
</div>

</body>
</html>
